name: Node Build

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      package-manager:
        type: string
        default: "npm"
      run-tests:
        type: boolean
        default: false
      test-command:
        type: string
        default: ""
      build-command:
        type: string
        default: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Build
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}

      - name: Test
        if: inputs.run-tests && inputs.test-command != ''
        env:
          CI: "true"
        run: ${{ inputs.test-command }}
